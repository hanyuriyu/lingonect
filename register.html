<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Register — Lingonect</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --cobalt:#0047FF;
  --text-col:400px;
  --logo-size:240px;
  --logo-opacity:0.9;
  --mobile-logo:120px;
}

*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Special Elite","Courier New",monospace;
}

/* === LOGO RAIL (desktop: left side) === */
.logo-rail{
  position:fixed;
  top:50%;
  left:0;
  transform:translateY(-50%);
  width:calc(50% - (var(--text-col) / 2));
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1;
  pointer-events:none;
}

.logo{
  width:var(--logo-size);
  height:var(--logo-size);
  object-fit:contain;
  opacity:var(--logo-opacity);
}

/* === FORM STAGE (desktop: center) === */
.stage{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:var(--text-col);
  max-height:88vh;
  overflow-y:auto;
  scrollbar-width:none;
  z-index:2;
}
.stage::-webkit-scrollbar{ display:none; }

/* === FORM ELEMENTS === */
.form-title{
  font-size:20px;
  font-weight:400;
  margin:0 0 26px;
  letter-spacing:.3px;
}

.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:11px 16px;
  font-family:"Special Elite","Courier New",monospace;
  font-size:15px;
  color:#111;
  background:#fff;
  border:1px solid #111;
  cursor:pointer;
  transition:background .2s, color .2s;
}
.google-btn:hover{
  background:#111;
  color:#fff;
}
.google-btn:hover .g-path{ fill:#fff !important; }

.divider{
  display:flex;
  align-items:center;
  gap:14px;
  margin:22px 0;
}
.divider::before,.divider::after{
  content:'';
  flex:1;
  border-top:1px solid #ccc;
}
.divider span{
  font-size:13px;
  color:#999;
}

/* Side-by-side row for first/last name */
.input-row{
  display:flex;
  gap:20px;
}
.input-row .input-group{ flex:1; }

.input-group{
  margin-bottom:20px;
}
.input-group label{
  display:block;
  font-size:11px;
  color:#888;
  margin-bottom:5px;
  letter-spacing:.8px;
  text-transform:uppercase;
}
.input-group input{
  width:100%;
  font-family:"Special Elite","Courier New",monospace;
  font-size:16px;
  color:#111;
  border:none;
  border-bottom:1px solid #bbb;
  padding:6px 0;
  background:transparent;
  outline:none;
  transition:border-color .2s;
}
.input-group input:focus{
  border-bottom-color:#111;
}

.submit-btn{
  width:100%;
  padding:11px;
  font-family:"Special Elite","Courier New",monospace;
  font-size:16px;
  color:#fff;
  background:#111;
  border:1px solid #111;
  cursor:pointer;
  margin-top:6px;
  transition:background .2s, color .2s;
}
.submit-btn:hover{
  background:#fff;
  color:#111;
}

.form-footer{
  text-align:center;
  margin-top:22px;
  font-size:14px;
  color:#777;
}
.form-footer a{
  color:#111;
  text-decoration:none;
  border-bottom:1px solid #111;
}
.form-footer a:hover{ color:var(--cobalt); border-bottom-color:var(--cobalt); }

.error-msg{
  font-size:13px;
  color:#c00;
  margin-top:14px;
  display:none;
  line-height:1.5;
}

/* Success state shown after email/password registration */
.success-panel{
  display:none;
  text-align:center;
  line-height:1.9;
}
.success-panel .check{
  font-size:32px;
  margin-bottom:16px;
}
.success-panel p{
  font-size:16px;
  margin:0 0 24px;
}
.success-panel a{
  font-size:15px;
  color:#111;
  text-decoration:none;
  border-bottom:1px solid #111;
}
.success-panel a:hover{ color:var(--cobalt); border-bottom-color:var(--cobalt); }

/* === MOBILE === */
@media (max-width: 820px){
  html,body{ height:auto; overflow-y:auto; }

  .logo-rail{
    position:static;
    transform:none;
    width:100%;
    padding:32px 0 20px;
    pointer-events:auto;
    justify-content:center;
  }
  .logo{
    width:var(--mobile-logo);
    height:var(--mobile-logo);
  }

  .stage{
    position:static;
    transform:none;
    width:min(90vw, 400px);
    max-height:none;
    overflow:visible;
    margin:0 auto 60px;
  }
}

@media (max-width: 480px){
  .input-row{ flex-direction:column; gap:0; }
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-rail">
  <img class="logo" src="logo.png" alt="Lingonect">
</div>

<!-- FORM -->
<main class="stage">
  <div id="formPanel">
    <p class="form-title">Register</p>

    <!-- Google -->
    <button class="google-btn" id="googleBtn" type="button">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path class="g-path" fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path class="g-path" fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path class="g-path" fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path class="g-path" fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <div class="input-row">
      <div class="input-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" autocomplete="given-name">
      </div>
      <div class="input-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" autocomplete="family-name">
      </div>
    </div>

    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" spellcheck="false">
    </div>

    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email">
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="new-password">
    </div>

    <div class="input-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" autocomplete="new-password">
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="submit-btn" id="registerBtn" type="button">Register</button>

    <p class="form-footer">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <!-- Shown after successful email/password registration -->
  <div class="success-panel" id="successPanel">
    <div class="check">✓</div>
    <p id="successText">
      We sent a verification email to your address.<br>
      Please click the link in that email to activate your account,<br>
      then come back and log in.
    </p>
    <a href="login.html">Go to Login</a>
  </div>
</main>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// SETUP: Replace with your Firebase config (same as login.html).
// ─────────────────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyAWxr3efpy-5Eo8fuXB5xxHHkvrbCcIIA0",
  authDomain:        "lingonect-4db51.firebaseapp.com",
  projectId:         "lingonect-4db51",
  storageBucket:     "lingonect-4db51.firebasestorage.app",
  messagingSenderId: "97117277218",
  appId:             "1:97117277218:web:cf1321d3e76167e692ce7b"
};
// ─────────────────────────────────────────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Redirect already-authenticated users
auth.onAuthStateChanged(user => {
  if (user && user.emailVerified) {
    window.location.href = "dashboard.html";
  }
});

const errorEl   = document.getElementById("errorMsg");
const formPanel = document.getElementById("formPanel");
const successPanel = document.getElementById("successPanel");

function showError(msg){
  errorEl.textContent = msg;
  errorEl.style.display = "block";
}
function clearError(){ errorEl.style.display = "none"; }

function showSuccess(email){
  document.getElementById("successText").innerHTML =
    `We sent a verification email to <strong>${email}</strong>.<br>
     Please click the link in that email to activate your account,<br>
     then come back and log in.`;
  formPanel.style.display  = "none";
  successPanel.style.display = "block";
}

// Google registration / sign-in
document.getElementById("googleBtn").addEventListener("click", () => {
  clearError();
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(cred => {
      // Store display name for the session
      const user = cred.user;
      localStorage.setItem("lingonect_displayName", user.displayName || "");
      window.location.href = "dashboard.html";
    })
    .catch(err => showError(err.message));
});

// Email / password registration
document.getElementById("registerBtn").addEventListener("click", () => {
  clearError();

  const firstName = document.getElementById("firstName").value.trim();
  const lastName  = document.getElementById("lastName").value.trim();
  const username  = document.getElementById("username").value.trim();
  const email     = document.getElementById("email").value.trim();
  const password  = document.getElementById("password").value;
  const confirm   = document.getElementById("confirmPassword").value;

  if (!firstName || !lastName || !username || !email || !password || !confirm) {
    showError("Please fill in all fields."); return;
  }
  if (password !== confirm) {
    showError("Passwords do not match."); return;
  }
  if (password.length < 6) {
    showError("Password must be at least 6 characters."); return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(cred => {
      // Save extra profile data locally
      localStorage.setItem("lingonect_username",    username);
      localStorage.setItem("lingonect_displayName", `${firstName} ${lastName}`);

      // Update Firebase display name
      return cred.user.updateProfile({ displayName: `${firstName} ${lastName}` })
        .then(() => cred.user.sendEmailVerification())
        .then(() => {
          auth.signOut();
          showSuccess(email);
        });
    })
    .catch(err => {
      if (err.code === "auth/email-already-in-use") {
        showError("An account with this email already exists. Try logging in instead.");
      } else if (err.code === "auth/weak-password") {
        showError("Password must be at least 6 characters.");
      } else {
        showError(err.message);
      }
    });
});
</script>
</body>
</html>
