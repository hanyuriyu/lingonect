<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Register — Lingonect</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --cobalt:#0047FF;
  --text-col:400px;
  --logo-size:240px;
  --logo-opacity:0.9;
  --mobile-logo:120px;
}

*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Special Elite","Courier New",monospace;
}

/* === LOGO RAIL (desktop: left side) === */
.logo-rail{
  position:fixed;
  top:50%;
  left:0;
  transform:translateY(-50%);
  width:calc(50% - (var(--text-col) / 2));
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1;
  pointer-events:none;
}

.logo{
  width:var(--logo-size);
  height:var(--logo-size);
  object-fit:contain;
  opacity:var(--logo-opacity);
}

/* === FORM STAGE (desktop: center) === */
.stage{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:var(--text-col);
  max-height:88vh;
  overflow-y:auto;
  scrollbar-width:none;
  z-index:2;
}
.stage::-webkit-scrollbar{ display:none; }

/* === FORM ELEMENTS === */
.form-title{
  font-size:20px;
  font-weight:400;
  margin:0 0 26px;
  letter-spacing:.3px;
}

.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:11px 16px;
  font-family:"Special Elite","Courier New",monospace;
  font-size:15px;
  color:#111;
  background:#fff;
  border:1px solid #111;
  cursor:pointer;
  transition:background .2s, color .2s;
}
.google-btn:hover{
  background:#111;
  color:#fff;
}
.google-btn:hover .g-path{ fill:#fff !important; }

.divider{
  display:flex;
  align-items:center;
  gap:14px;
  margin:22px 0;
}
.divider::before,.divider::after{
  content:'';
  flex:1;
  border-top:1px solid #ccc;
}
.divider span{
  font-size:13px;
  color:#999;
}

/* Side-by-side row for first/last name */
.input-row{
  display:flex;
  gap:20px;
}
.input-row .input-group{ flex:1; }

.input-group{
  margin-bottom:20px;
}
.input-group label{
  display:block;
  font-size:11px;
  color:#888;
  margin-bottom:5px;
  letter-spacing:.8px;
  text-transform:uppercase;
}
.input-group input{
  width:100%;
  font-family:"Special Elite","Courier New",monospace;
  font-size:16px;
  color:#111;
  border:none;
  border-bottom:1px solid #bbb;
  padding:6px 0;
  background:transparent;
  outline:none;
  transition:border-color .2s;
}
.input-group input:focus{
  border-bottom-color:#111;
}

.submit-btn{
  width:100%;
  padding:11px;
  font-family:"Special Elite","Courier New",monospace;
  font-size:16px;
  color:#fff;
  background:#111;
  border:1px solid #111;
  cursor:pointer;
  margin-top:6px;
  transition:background .2s, color .2s;
}
.submit-btn:hover{
  background:#fff;
  color:#111;
}

.form-footer{
  text-align:center;
  margin-top:22px;
  font-size:14px;
  color:#777;
}
.form-footer a{
  color:#111;
  text-decoration:none;
  border-bottom:1px solid #111;
}
.form-footer a:hover{ color:var(--cobalt); border-bottom-color:var(--cobalt); }

.error-msg{
  font-size:13px;
  color:#c00;
  margin-top:14px;
  display:none;
  line-height:1.5;
}

/* Success state shown after email/password registration */
.success-panel{
  display:none;
  text-align:center;
  line-height:1.9;
}
.success-panel .check{
  font-size:32px;
  margin-bottom:16px;
}
.success-panel p{
  font-size:16px;
  margin:0 0 24px;
}
.success-panel a{
  font-size:15px;
  color:#111;
  text-decoration:none;
  border-bottom:1px solid #111;
}
.success-panel a:hover{ color:var(--cobalt); border-bottom-color:var(--cobalt); }

/* === MOBILE === */
@media (max-width: 820px){
  html,body{ height:auto; overflow-y:auto; }

  .logo-rail{
    position:static;
    transform:none;
    width:100%;
    padding:32px 0 20px;
    pointer-events:auto;
    justify-content:center;
  }
  .logo{
    width:var(--mobile-logo);
    height:var(--mobile-logo);
  }

  .stage{
    position:static;
    transform:none;
    width:min(90vw, 400px);
    max-height:none;
    overflow:visible;
    margin:0 auto 60px;
  }
}

@media (max-width: 480px){
  .input-row{ flex-direction:column; gap:0; }
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-rail">
  <a href="index.html"><img class="logo" src="logo.png" alt="Lingonect"></a>
</div>

<!-- FORM -->
<main class="stage">
  <div id="formPanel">
    <p class="form-title">Registration closed</p>
    <p style="font-size:15px;color:#555;line-height:1.7;margin:0 0 28px;">
      New registrations are not available at this time.
    </p>
    <p class="form-footer">Already have an account? <a href="login.html">Login</a></p>
  </div>
</main>

<footer style="text-align:center;padding:1rem 0 0.5rem;font-size:0.75rem;color:#888;">&copy; 2026 Lingonect &nbsp;|&nbsp; <a href="terms.html" style="color:#888;text-decoration:none;border-bottom:1px solid #ccc;">Terms of Use</a> &nbsp;|&nbsp; <a href="privacy.html" style="color:#888;text-decoration:none;border-bottom:1px solid #ccc;">Privacy Policy</a></footer>
</body>
</html>
