<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Register — Lingonect</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --cobalt:#0047FF;
  --text-col:400px;
  --logo-size:240px;
  --logo-opacity:0.9;
  --mobile-logo:120px;
}

*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Special Elite","Courier New",monospace;
}

/* === LOGO RAIL (desktop: left side) === */
.logo-rail{
  position:fixed;
  top:50%;
  left:0;
  transform:translateY(-50%);
  width:calc(50% - (var(--text-col) / 2));
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1;
  pointer-events:none;
}

.logo{
  width:var(--logo-size);
  height:var(--logo-size);
  object-fit:contain;
  opacity:var(--logo-opacity);
}

/* === FORM STAGE (desktop: center) === */
.stage{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:var(--text-col);
  max-height:88vh;
  overflow-y:auto;
  scrollbar-width:none;
  z-index:2;
}
.stage::-webkit-scrollbar{ display:none; }

/* === FORM ELEMENTS === */
.form-title{
  font-size:20px;
  font-weight:400;
  margin:0 0 26px;
  letter-spacing:.3px;
}

.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:11px 16px;
  font-family:"Special Elite","Courier New",monospace;
  font-size:15px;
  color:#111;
  background:#fff;
  border:1px solid #111;
  cursor:pointer;
  transition:background .2s, color .2s;
}
.google-btn:hover{
  background:#111;
  color:#fff;
}
.google-btn:hover .g-path{ fill:#fff !important; }

.divider{
  display:flex;
  align-items:center;
  gap:14px;
  margin:22px 0;
}
.divider::before,.divider::after{
  content:'';
  flex:1;
  border-top:1px solid #ccc;
}
.divider span{
  font-size:13px;
  color:#999;
}

/* Side-by-side row for first/last name */
.input-row{
  display:flex;
  gap:20px;
}
.input-row .input-group{ flex:1; }

.input-group{
  margin-bottom:20px;
}
.input-group label{
  display:block;
  font-size:11px;
  color:#888;
  margin-bottom:5px;
  letter-spacing:.8px;
  text-transform:uppercase;
}
.input-group input{
  width:100%;
  font-family:"Special Elite","Courier New",monospace;
  font-size:16px;
  color:#111;
  border:none;
  border-bottom:1px solid #bbb;
  padding:6px 0;
  background:transparent;
  outline:none;
  transition:border-color .2s;
}
.input-group input:focus{
  border-bottom-color:#111;
}

.submit-btn{
  width:100%;
  padding:11px;
  font-family:"Special Elite","Courier New",monospace;
  font-size:16px;
  color:#fff;
  background:#111;
  border:1px solid #111;
  cursor:pointer;
  margin-top:6px;
  transition:background .2s, color .2s;
}
.submit-btn:hover{
  background:#fff;
  color:#111;
}

.form-footer{
  text-align:center;
  margin-top:22px;
  font-size:14px;
  color:#777;
}
.form-footer a{
  color:#111;
  text-decoration:none;
  border-bottom:1px solid #111;
}
.form-footer a:hover{ color:var(--cobalt); border-bottom-color:var(--cobalt); }

.consent-group{
  margin:16px 0 6px;
}
.consent-label{
  display:flex;
  align-items:flex-start;
  gap:8px;
  font-size:11px;
  color:#666;
  line-height:1.6;
  cursor:pointer;
}
.consent-label input[type="checkbox"]{
  margin-top:3px;
  flex-shrink:0;
  accent-color:#111;
}
.consent-label a{
  color:#111;
  text-decoration:none;
  border-bottom:1px solid #999;
}
.consent-label a:hover{ color:var(--cobalt); border-bottom-color:var(--cobalt); }

.error-msg{
  font-size:13px;
  color:#c00;
  margin-top:14px;
  display:none;
  line-height:1.5;
}

/* Success state shown after email/password registration */
.success-panel{
  display:none;
  text-align:center;
  line-height:1.9;
}
.success-panel .check{
  font-size:32px;
  margin-bottom:16px;
}
.success-panel p{
  font-size:16px;
  margin:0 0 24px;
}
.success-panel a{
  font-size:15px;
  color:#111;
  text-decoration:none;
  border-bottom:1px solid #111;
}
.success-panel a:hover{ color:var(--cobalt); border-bottom-color:var(--cobalt); }

/* === MOBILE === */
@media (max-width: 820px){
  html,body{ height:auto; overflow-y:auto; }

  .logo-rail{
    position:static;
    transform:none;
    width:100%;
    padding:32px 0 20px;
    pointer-events:auto;
    justify-content:center;
  }
  .logo{
    width:var(--mobile-logo);
    height:var(--mobile-logo);
  }

  .stage{
    position:static;
    transform:none;
    width:min(90vw, 400px);
    max-height:none;
    overflow:visible;
    margin:0 auto 60px;
  }
}

@media (max-width: 480px){
  .input-row{ flex-direction:column; gap:0; }
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-rail">
  <a href="index.html"><img class="logo" src="logo.png" alt="Lingonect"></a>
</div>

<!-- FORM -->
<main class="stage">
  <div id="formPanel">
    <p class="form-title">Register</p>

    <!-- Google sign-up -->
    <button class="google-btn" id="googleBtn" type="button">
      <svg width="20" height="20" viewBox="0 0 48 48"><path class="g-path" fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
      Sign up with Google
    </button>

    <div class="divider"><span>or</span></div>

    <!-- Email/password form -->
    <div class="input-group">
      <label>Email</label>
      <input type="text" id="email" autocomplete="email" />
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" autocomplete="new-password" />
    </div>
    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" id="password2" autocomplete="new-password" />
    </div>
    <div class="consent-group">
      <label class="consent-label">
        <input type="checkbox" id="emailConsent" />
        <span>I consent to Lingonect storing my email address for account administration purposes. No other personal data is collected. You can withdraw consent at any time by contacting <a href="mailto:contact@lingonect.com">contact@lingonect.com</a>.</span>
      </label>
    </div>
    <button class="submit-btn" id="registerBtn" type="button">Create Account</button>
    <div class="error-msg" id="errorMsg"></div>

    <p class="form-footer">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <!-- Success panel (shown after registration) -->
  <div class="success-panel" id="successPanel">
    <div class="check">&#10003;</div>
    <p>Account created! A verification email has been sent.<br>Please check your inbox and verify before logging in.</p>
    <a href="login.html">Go to Login</a>
  </div>
</main>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyAWxr3efpy-5Eo8fuXB5xxHHkvrbCcIIA0",
  authDomain:        "lingonect-4db51.firebaseapp.com",
  projectId:         "lingonect-4db51",
  storageBucket:     "lingonect-4db51.firebasestorage.app",
  messagingSenderId: "97117277218",
  appId:             "1:97117277218:web:cf1321d3e76167e692ce7b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

const ALLOWED_REG_EMAILS = ["hanyuriyu@googlemail.com", "hob122020@gmail.com", "h.ben@lingonect.com"];

function isRegAllowed(email) {
  return ALLOWED_REG_EMAILS.includes(email.toLowerCase());
}

const errorEl  = document.getElementById("errorMsg");
function showError(msg) { errorEl.textContent = msg; errorEl.style.display = "block"; }
function clearError()   { errorEl.style.display = "none"; }

// Google sign-up
document.getElementById("googleBtn").addEventListener("click", () => {
  clearError();
  const emailConsent = document.getElementById("emailConsent").checked;
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(async cred => {
      if (!isRegAllowed(cred.user.email)) {
        cred.user.delete().catch(() => {});
        auth.signOut();
        showError("Registration is restricted. This email is not allowed.");
        return;
      }
      const profileData = {
        emailConsent,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      if (emailConsent) profileData.email = cred.user.email;
      await db.collection("profiles").doc(cred.user.uid).set(profileData, { merge: true });
      auth.signOut();
      document.getElementById("formPanel").style.display = "none";
      document.getElementById("successPanel").style.display = "block";
    })
    .catch(err => showError(err.message));
});

// Email/password registration
document.getElementById("registerBtn").addEventListener("click", () => {
  clearError();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const password2 = document.getElementById("password2").value;

  if (!email || !password || !password2) { showError("Please fill in all fields."); return; }
  if (password !== password2) { showError("Passwords do not match."); return; }
  if (password.length < 6) { showError("Password must be at least 6 characters."); return; }

  if (!isRegAllowed(email)) {
    showError("Registration is restricted. This email is not allowed.");
    return;
  }

  const emailConsent = document.getElementById("emailConsent").checked;

  auth.createUserWithEmailAndPassword(email, password)
    .then(async cred => {
      const profileData = {
        emailConsent,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      if (emailConsent) profileData.email = email;
      await db.collection("profiles").doc(cred.user.uid).set(profileData, { merge: true });
      await cred.user.sendEmailVerification();
      auth.signOut();
      document.getElementById("formPanel").style.display = "none";
      document.getElementById("successPanel").style.display = "block";
    })
    .catch(err => {
      if (err.code === "auth/email-already-in-use") {
        showError("An account with this email already exists.");
      } else {
        showError(err.message);
      }
    });
});

// Submit on Enter key
document.addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("registerBtn").click();
});
</script>

<footer style="text-align:center;padding:1rem 0 0.5rem;font-size:0.75rem;color:#888;">&copy; 2026 Lingonect &nbsp;|&nbsp; <a href="terms.html" style="color:#888;text-decoration:none;border-bottom:1px solid #ccc;">Terms of Use</a> &nbsp;|&nbsp; <a href="privacy.html" style="color:#888;text-decoration:none;border-bottom:1px solid #ccc;">Privacy Policy</a></footer>
</body>
</html>
