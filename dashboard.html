<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lingonect</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --cobalt:#0047FF;
  --text-col:620px;
  --logo-size:240px;
  --logo-opacity:0.9;
  --mobile-logo:130px;
}

html{
  height:100%;
}
body{
  margin:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:"Special Elite","Courier New",monospace;
  visibility:hidden;
  overflow-y:auto;
}

/* ── LOGO RAIL (fixed left column, desktop) ── */
.logo-rail{
  position:fixed;
  top:50%;
  left:0;
  transform:translateY(-50%);
  width:calc(50% - (var(--text-col) / 2));
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1;
}

.logo{ cursor:pointer; }

.logo{
  width:var(--logo-size);
  height:var(--logo-size);
  object-fit:contain;
  opacity:var(--logo-opacity);
}

/* ── PAGE WRAPPER ── */
.page-wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:60px 0 100px;
  box-sizing:border-box;
}

/* ── STAGE ── */
.stage{
  width:var(--text-col);
  max-width:92vw;
  margin:0 auto;
  position:relative;
  z-index:2;
}

.hero-headline{
  font-size:22px;
  font-weight:800;
  line-height:1.55;
  margin:0 0 10px;
  letter-spacing:.2px;
  white-space:nowrap;
  text-align:center;
}

.hero-sub{
  font-size:18px;
  font-weight:400;
  line-height:1.6;
  margin:0 0 28px;
  color:#111;
  text-align:center;
}

/* ── INPUT AREA ── */
.input-wrap{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.text-input{
  flex:1;
  font-family:"Special Elite","Courier New",monospace;
  font-size:15px;
  padding:12px 14px;
  border:2px solid var(--cobalt);
  border-radius:6px;
  outline:none;
  resize:vertical;
  min-height:60px;
  color:#111;
  background:#fff;
  box-sizing:border-box;
  line-height:1.5;
}

.text-input:focus{
  box-shadow:0 0 0 3px rgba(0,71,255,.15);
}

.text-input::placeholder{
  color:#bbb;
}

/* ── ACTIONS COLUMN (lang + submit) ── */
.input-actions{
  display:flex;
  flex-direction:column;
  gap:8px;
  flex-shrink:0;
}

/* Language selector */
.lang-select-wrap{
  position:relative;
}

.lang-btn{
  font-family:"Special Elite","Courier New",monospace;
  font-size:14px;
  font-weight:800;
  background:#fff;
  color:var(--cobalt);
  border:2px solid var(--cobalt);
  border-radius:6px;
  padding:10px 14px;
  cursor:pointer;
  white-space:nowrap;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  transition:background .15s;
  box-sizing:border-box;
}

.lang-btn:hover{
  background:rgba(0,71,255,.06);
}

.lang-arrow{
  font-size:10px;
  opacity:.7;
  transition:transform .15s;
}

.lang-select-wrap.open .lang-arrow{
  transform:rotate(180deg);
}

.lang-dropdown{
  display:none;
  position:absolute;
  top:calc(100% + 6px);
  right:0;
  background:#fff;
  border:2px solid var(--cobalt);
  border-radius:6px;
  z-index:200;
  min-width:160px;
  max-height:280px;
  overflow-y:auto;
  box-shadow:0 6px 24px rgba(0,0,0,.11);
}

.lang-select-wrap.open .lang-dropdown{
  display:block;
}

.lang-option{
  display:block;
  width:100%;
  padding:10px 16px;
  text-align:left;
  font-family:"Special Elite","Courier New",monospace;
  font-size:14px;
  background:none;
  border:none;
  cursor:pointer;
  color:#111;
  box-sizing:border-box;
  transition:background .1s, color .1s;
}

.lang-option:hover{
  background:rgba(0,71,255,.07);
  color:var(--cobalt);
}

.lang-option.active{
  color:var(--cobalt);
  font-weight:800;
}

.submit-btn{
  font-family:"Special Elite","Courier New",monospace;
  font-size:14px;
  font-weight:800;
  background:var(--cobalt);
  color:#fff;
  border:2px solid var(--cobalt);
  border-radius:6px;
  padding:11px 22px;
  cursor:pointer;
  white-space:nowrap;
  transition:opacity .2s;
  width:100%;
}

.submit-btn:hover:not(:disabled){ opacity:.85; }
.submit-btn:disabled{ opacity:.45; cursor:not-allowed; }

.word-count{
  font-size:12px;
  color:#999;
  margin-top:6px;
  text-align:right;
}
.word-count.over{ color:#cc0000; }

/* ── RESULTS ── */
.results-area{
  margin-top:28px;
}

.result-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:22px 0;
  border-top:1px solid #e8e8e8;
  text-align:center;
}

/* Logo container */
.engine-logo-wrap{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.engine-logo-img{
  width:40px;
  height:40px;
  border-radius:8px;
  object-fit:contain;
}

/* Fallback text badge when img fails */
.engine-logo-badge{
  width:40px;
  height:40px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  font-weight:900;
  color:#fff;
  letter-spacing:-.5px;
}
.engine-logo-badge.mistral{ background:#f0501a; }
.engine-logo-badge.jais   { background:#006c52; }

.result-content{
  width:100%;
}

.engine-name{
  font-size:11px;
  font-weight:800;
  color:#999;
  text-transform:uppercase;
  letter-spacing:.6px;
  margin:0 0 8px;
  text-align:center;
}

.translation-text{
  font-size:16px;
  line-height:1.65;
  margin:0;
  color:#111;
  text-align:center;
}

.translation-text.loading{
  color:#aaa;
  font-style:italic;
}

/* ── LOGOUT / BOTTOM BAR ── */
.logout-wrap{
  position:fixed;
  bottom:28px;
  left:0;
  right:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3;
}
.logout-btn{
  font-family:"Special Elite","Courier New",monospace;
  font-size:14px;
  font-weight:800;
  color:#000;
  background:none;
  border:none;
  cursor:pointer;
  padding:0;
  transition:color .2s;
}
.logout-btn:hover{ color:var(--cobalt); }

/* ── API KEYS MODAL ── */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  z-index:1000;
  align-items:center;
  justify-content:center;
}
.modal-overlay.open{ display:flex; }

.modal{
  background:#fff;
  border:2px solid var(--cobalt);
  border-radius:10px;
  padding:32px;
  width:min(420px, 92vw);
  box-sizing:border-box;
  box-shadow:0 8px 40px rgba(0,0,0,.14);
}

.modal-title{
  font-size:16px;
  font-weight:800;
  margin:0 0 22px;
  color:var(--cobalt);
}

.key-field{ margin-bottom:18px; }

.key-label{
  display:block;
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.5px;
  color:#999;
  margin-bottom:6px;
}

.key-input{
  font-family:"Special Elite","Courier New",monospace;
  font-size:13px;
  width:100%;
  padding:10px 12px;
  border:2px solid #ddd;
  border-radius:6px;
  box-sizing:border-box;
  outline:none;
  transition:border-color .15s;
}
.key-input:focus{ border-color:var(--cobalt); }

.modal-actions{
  display:flex;
  gap:10px;
  justify-content:flex-end;
  margin-top:24px;
}

.modal-save-btn{
  font-family:"Special Elite","Courier New",monospace;
  font-size:14px;
  font-weight:800;
  background:var(--cobalt);
  color:#fff;
  border:2px solid var(--cobalt);
  border-radius:6px;
  padding:10px 22px;
  cursor:pointer;
  transition:opacity .2s;
}
.modal-save-btn:hover{ opacity:.85; }

.modal-cancel-btn{
  font-family:"Special Elite","Courier New",monospace;
  font-size:14px;
  font-weight:800;
  background:#fff;
  color:var(--cobalt);
  border:2px solid var(--cobalt);
  border-radius:6px;
  padding:10px 18px;
  cursor:pointer;
  transition:background .15s;
}
.modal-cancel-btn:hover{ background:rgba(0,71,255,.06); }

/* ── MOBILE ── */
@media (max-width:820px){
  .logo-rail{
    position:relative;
    top:auto;
    left:auto;
    transform:none;
    width:auto;
    justify-content:center;
    padding:32px 0 4px;
    margin-bottom:10px;
  }
  .logo{ width:var(--mobile-logo); height:var(--mobile-logo); }

  .page-wrap{
    justify-content:flex-start;
    padding:0 0 100px;
  }

  .stage{
    padding:0 16px;
    box-sizing:border-box;
  }

  .hero-headline{
    font-size:16px;
    white-space:normal;
  }
  .hero-sub{ font-size:15px; }
}

@media (max-width:420px){
  .logo{ width:110px; height:110px; }
  .hero-headline{ font-size:14px; }
}
</style>
</head>

<body>

<!-- LOGO — fixed left rail on desktop, top-center on mobile -->
<div class="logo-rail">
  <img class="logo" src="logo.png" alt="Lingonect" id="logoImg" title="Settings">
</div>

<div class="page-wrap">
  <main class="stage">

    <p class="hero-headline">Translate. Transcreate. Localize. Culturalize.</p>
    <p class="hero-sub">The speed of AI + The cultural insight of Humans</p>

    <!-- INPUT -->
    <div class="input-wrap">
      <textarea
        class="text-input"
        id="inputText"
        placeholder="Enter text in any language…"
        rows="3"
        spellcheck="false"
      ></textarea>

      <div class="input-actions">
        <!-- Language selector -->
        <div class="lang-select-wrap" id="langSelectWrap">
          <button class="lang-btn" id="langBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span id="langLabel">English</span>
            <span class="lang-arrow">▾</span>
          </button>
          <div class="lang-dropdown" id="langDropdown" role="listbox">
            <button class="lang-option active" data-lang="English">English</button>
            <button class="lang-option" data-lang="Spanish">Spanish</button>
            <button class="lang-option" data-lang="French">French</button>
            <button class="lang-option" data-lang="German">German</button>
            <button class="lang-option" data-lang="Italian">Italian</button>
            <button class="lang-option" data-lang="Portuguese">Portuguese</button>
            <button class="lang-option" data-lang="Swedish">Swedish</button>
            <button class="lang-option" data-lang="Norwegian">Norwegian</button>
            <button class="lang-option" data-lang="Danish">Danish</button>
            <button class="lang-option" data-lang="Finnish">Finnish</button>
            <button class="lang-option" data-lang="Dutch">Dutch</button>
            <button class="lang-option" data-lang="Polish">Polish</button>
            <button class="lang-option" data-lang="Russian">Russian</button>
            <button class="lang-option" data-lang="Ukrainian">Ukrainian</button>
            <button class="lang-option" data-lang="Turkish">Turkish</button>
            <button class="lang-option" data-lang="Arabic">Arabic</button>
            <button class="lang-option" data-lang="Hebrew">Hebrew</button>
            <button class="lang-option" data-lang="Japanese">Japanese</button>
            <button class="lang-option" data-lang="Chinese (Simplified)">Chinese (Simplified)</button>
            <button class="lang-option" data-lang="Chinese (Traditional)">Chinese (Traditional)</button>
            <button class="lang-option" data-lang="Korean">Korean</button>
            <button class="lang-option" data-lang="Hindi">Hindi</button>
          </div>
        </div>

        <button class="submit-btn" id="submitBtn" type="button" disabled>Submit</button>
      </div>
    </div>
    <div class="word-count" id="wordCount">0 / 50 words</div>

    <!-- RESULTS -->
    <div class="results-area" id="resultsArea"></div>

  </main>
</div>

<!-- Bottom bar -->
<div class="logout-wrap">
  <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
</div>

<!-- API Keys modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <p class="modal-title">API Keys</p>
    <div class="key-field">
      <label class="key-label" for="mistralKeyInput">Mistral API Key</label>
      <input class="key-input" id="mistralKeyInput" type="password"
             placeholder="…" autocomplete="off" spellcheck="false">
    </div>
    <div class="key-field">
      <label class="key-label" for="hfTokenInput">HuggingFace Token (Jais)</label>
      <input class="key-input" id="hfTokenInput" type="password"
             placeholder="hf_…" autocomplete="off" spellcheck="false">
    </div>
    <div class="modal-actions">
      <button class="modal-cancel-btn" id="modalCancel" type="button">Cancel</button>
      <button class="modal-save-btn"   id="modalSave"   type="button">Save</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// ── Firebase auth ──
const firebaseConfig = {
  apiKey:            "AIzaSyAWxr3efpy-5Eo8fuXB5xxHHkvrbCcIIA0",
  authDomain:        "lingonect-4db51.firebaseapp.com",
  projectId:         "lingonect-4db51",
  storageBucket:     "lingonect-4db51.firebasestorage.app",
  messagingSenderId: "97117277218",
  appId:             "1:97117277218:web:cf1321d3e76167e692ce7b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (!user || !user.emailVerified) {
    window.location.href = "login.html";
    return;
  }
  document.body.style.visibility = "visible";
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  auth.signOut().then(() => { window.location.href = "index.html"; });
});

// ── Language selector ──
let targetLang = "English";
const langWrap     = document.getElementById("langSelectWrap");
const langBtn      = document.getElementById("langBtn");
const langLabel    = document.getElementById("langLabel");
const langDropdown = document.getElementById("langDropdown");

langBtn.addEventListener("click", e => {
  e.stopPropagation();
  const isOpen = langWrap.classList.toggle("open");
  langBtn.setAttribute("aria-expanded", isOpen);
});

langDropdown.addEventListener("click", e => {
  const opt = e.target.closest(".lang-option");
  if (!opt) return;
  targetLang = opt.dataset.lang;
  langLabel.textContent = opt.dataset.lang;
  langDropdown.querySelectorAll(".lang-option").forEach(o => o.classList.toggle("active", o === opt));
  langWrap.classList.remove("open");
  langBtn.setAttribute("aria-expanded", "false");
});

document.addEventListener("click", () => {
  langWrap.classList.remove("open");
  langBtn.setAttribute("aria-expanded", "false");
});

// ── Word counter ──
const inputEl  = document.getElementById("inputText");
const countEl  = document.getElementById("wordCount");
const submitEl = document.getElementById("submitBtn");

function countWords(text) {
  const trimmed = text.trim();
  return trimmed === "" ? 0 : trimmed.split(/\s+/).length;
}

inputEl.addEventListener("input", () => {
  const n = countWords(inputEl.value);
  countEl.textContent = `${n} / 50 words`;
  countEl.classList.toggle("over", n > 50);
  submitEl.disabled = n === 0 || n > 50;
});

// ── Mistral AI ──
async function translateWithMistral(text) {
  const key = localStorage.getItem("mistral_key");
  if (!key) throw new Error("Mistral API key not set — click \"API Keys\" below to add it.");
  const res = await fetch("https://api.mistral.ai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type":  "application/json",
      "Authorization": `Bearer ${key}`
    },
    body: JSON.stringify({
      model: "mistral-small-latest",
      messages: [
        {
          role: "system",
          content: `You are a professional translator. Detect the source language of the text and translate it to ${targetLang}. Return only the translated text — no explanations, no labels, no extra commentary.`
        },
        { role: "user", content: text }
      ]
    })
  });
  if (!res.ok) throw new Error(`Mistral ${res.status}`);
  const data = await res.json();
  return data.choices[0].message.content.trim();
}

// ── API Keys modal (triggered by clicking the logo) ──
const settingsModal   = document.getElementById("settingsModal");
const hfTokenInput    = document.getElementById("hfTokenInput");
const modalCancel     = document.getElementById("modalCancel");
const modalSave       = document.getElementById("modalSave");
const mistralKeyInput = document.getElementById("mistralKeyInput");

document.getElementById("logoImg").addEventListener("click", () => {
  mistralKeyInput.value = localStorage.getItem("mistral_key") || "";
  hfTokenInput.value    = localStorage.getItem("jais_hf_token") || "";
  settingsModal.classList.add("open");
});
modalCancel.addEventListener("click", () => settingsModal.classList.remove("open"));
settingsModal.addEventListener("click", e => {
  if (e.target === settingsModal) settingsModal.classList.remove("open");
});
modalSave.addEventListener("click", () => {
  const mk = mistralKeyInput.value.trim();
  if (mk) localStorage.setItem("mistral_key", mk);
  else    localStorage.removeItem("mistral_key");
  const hf = hfTokenInput.value.trim();
  if (hf) localStorage.setItem("jais_hf_token", hf);
  else    localStorage.removeItem("jais_hf_token");
  settingsModal.classList.remove("open");
});

// ── Jais-2 (HuggingFace serverless text-generation endpoint) ──
// Uses the standard /models/{id} endpoint which supports browser CORS.
// Token is stored in localStorage — click the logo to open API Keys.
const JAIS_ENDPOINT =
  "https://api-inference.huggingface.co/models/inceptionai/Jais-2-8B-Chat";

async function translateWithJais(text) {
  const token = localStorage.getItem("jais_hf_token");
  if (!token) throw new Error("HuggingFace token not set — click the logo to add it.");

  const prompt =
    `Translate the following text to ${targetLang}. ` +
    `Return only the translation, no explanations.\n\nText: ${text}\n\nTranslation:`;

  const res = await fetch(JAIS_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type":     "application/json",
      "Authorization":    `Bearer ${token}`,
      "x-wait-for-model": "true"
    },
    body: JSON.stringify({
      inputs: prompt,
      parameters: {
        max_new_tokens:   200,
        temperature:      0.3,
        return_full_text: false
      }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `Jais ${res.status}`);
  }
  const data = await res.json();
  const raw = Array.isArray(data) ? data[0].generated_text : data.generated_text;
  return raw.trim();
}

// ── Engine registry (add future engines here) ──
const engines = [
  {
    id:         "mistral",
    name:       "Mistral AI",
    logoUrl:    "https://mistral.ai/favicon.ico",
    badgeClass: "mistral",
    badgeText:  "M",
    translate:  translateWithMistral
  },
  {
    id:         "jais",
    name:       "Jais",
    logoUrl:    "https://jaischat.ai/favicon.ico",
    badgeClass: "jais",
    badgeText:  "J",
    translate:  translateWithJais
  }
];

// ── Build a result card ──
function buildCard(engine) {
  const card = document.createElement("div");
  card.className = "result-card";

  const logoHtml = `
    <div class="engine-logo-wrap">
      <img
        class="engine-logo-img"
        src="${engine.logoUrl}"
        alt="${engine.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
      >
      <div class="engine-logo-badge ${engine.badgeClass}" style="display:none">${engine.badgeText}</div>
    </div>`;

  card.innerHTML = `
    ${logoHtml}
    <div class="result-content">
      <p class="engine-name">${engine.name}</p>
      <p class="translation-text loading" id="result-${engine.id}">Translating…</p>
    </div>`;

  return card;
}

// ── Submit ──
submitEl.addEventListener("click", async () => {
  const text = inputEl.value.trim();
  if (!text || countWords(text) > 50) return;

  const resultsArea = document.getElementById("resultsArea");
  resultsArea.innerHTML = "";
  submitEl.disabled = true;

  // Render all engine cards immediately (shows "Translating…")
  engines.forEach(engine => resultsArea.appendChild(buildCard(engine)));

  // Fire all translations in parallel
  engines.forEach(async engine => {
    const el = document.getElementById(`result-${engine.id}`);
    try {
      const translation = await engine.translate(text);
      el.textContent = translation;
      el.classList.remove("loading");
    } catch (err) {
      el.textContent = err.message || "Translation failed.";
      el.classList.remove("loading");
      console.error(engine.name, err);
    }
  });

  submitEl.disabled = false;
});
</script>
</body>
</html>
